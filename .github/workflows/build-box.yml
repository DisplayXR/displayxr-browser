name: build-box

# Drives the Chromium build box (AWS EC2, stop-by-default) from CI with NO long-lived
# secret — GitHub OIDC → a least-privilege AWS role (browser#34, decision #1 on #33).
#
# Reusable: the rebase pipeline (#35/#36) calls this to do the actual build. Also
# workflow_dispatch-able on its own for smoke-testing the lifecycle.
#
# CONTRACT: the box is STOPPED before and after. The stop step runs with `if: always()`
# so a failed/cancelled build can never leave the instance (and the bill) running.
#
# One-time AWS setup: scripts/aws/setup-oidc.sh --apply
# Repo variable required: AWS_BUILD_ROLE_ARN (printed by that script).

on:
  workflow_call:
    inputs:
      chromium_tag:
        # NOTE: do_build.ps1 does not read this - it builds whatever C:\cr\src is currently
        # checked out at. Applying a tag is do_rebase.ps1's job (the #36 rebase lane), so
        # this input is informational until that lane calls us. It was previously exported
        # as $env:CHROMIUM_TAG into the build command, which nothing consumed.
        description: "Chromium tag to build (informational; the rebase lane applies the pin)"
        type: string
        default: ""
      job:
        description: "Marker/job name written by do_build.ps1 (C:\\build\\<job>.done)"
        type: string
        default: "official18"
      task_name:
        description: "Scheduled task that runs do_build.ps1 as Administrator"
        type: string
        default: "crbuild"
      timeout_minutes:
        description: "Max minutes to wait for the remote build"
        type: number
        default: 180
    outputs:
      artifact_key:
        description: "S3 key of the produced tarball"
        value: ${{ jobs.build.outputs.artifact_key }}
  workflow_dispatch:
    inputs:
      chromium_tag:
        description: "Chromium tag to build (blank = pin)"
        type: string
        default: ""
      lifecycle_only:
        description: "Start + stop the box without building (smoke-test OIDC)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # mint the OIDC token we trade for the AWS role

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-0150c4a09e3852120
  ARTIFACT_BUCKET: displayxr-browser-artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    # The role's trust policy pins sub to `...:environment:build-box`, so this line is
    # load-bearing: without it the OIDC token has a different sub and AssumeRole fails.
    environment: build-box
    outputs:
      artifact_key: ${{ steps.fetch.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Assume AWS role (OIDC, no stored secret)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-build-box-${{ github.run_id }}

      - name: Start the build box
        run: |
          set -euo pipefail
          state=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
                  --query 'Reservations[0].Instances[0].State.Name' --output text)
          echo "current state: $state"
          if [ "$state" != "running" ]; then
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null
          fi
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          echo "instance running"

      - name: Wait for SSM agent
        run: |
          set -euo pipefail
          # The agent registers a little after the instance reports running.
          for i in $(seq 1 40); do
            ping=$(aws ssm describe-instance-information \
                    --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
                    --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || true)
            [ "$ping" = "Online" ] && { echo "SSM online"; exit 0; }
            echo "  ssm ping=$ping ($i/40)"; sleep 15
          done
          echo "::error::SSM agent never came Online — cannot drive the build remotely."
          exit 1

      # Rebase onto the target Chromium tag BEFORE building, when one is given (#36).
      # Skipped when chromium_tag is blank (a plain rebuild of the current checkout).
      # A patch conflict fails here and the build never runs — the drift gate.
      - name: Rebase onto chromium_tag (SSM RunCommand -> crbuild)
        if: ${{ (github.event_name == 'workflow_call' || !inputs.lifecycle_only) && inputs.chromium_tag != '' }}
        id: rebase
        env:
          CHROMIUM_TAG: ${{ inputs.chromium_tag }}
        run: |
          set -euo pipefail
          chmod +x scripts/aws/ssm-run.sh
          # Stage BOTH the canonical rebase script and its driver, then run the driver.
          reb=$(base64 -w0 scripts/aws/do_rebase.ps1)
          drv=$(base64 -w0 scripts/aws/remote-rebase.ps1)
          printf '%s\n' \
            "[IO.File]::WriteAllBytes(\"C:\\build\\do_rebase.ps1\", [Convert]::FromBase64String(\"${reb}\"))" \
            "[IO.File]::WriteAllBytes(\"C:\\build\\remote-rebase.ps1\", [Convert]::FromBase64String(\"${drv}\"))" \
            "& powershell -NoProfile -ExecutionPolicy Bypass -File C:\\build\\remote-rebase.ps1 -Tag '${CHROMIUM_TAG}' -TimeoutMinutes 60" \
            'exit $LASTEXITCODE' \
          | scripts/aws/ssm-run.sh "$INSTANCE_ID" "browser#36 rebase ${GITHUB_RUN_ID} -> ${CHROMIUM_TAG}" 60

      # Trigger the build through the `crbuild` scheduled task, NOT by invoking
      # do_build.ps1 directly: RunCommand is SYSTEM, depot_tools needs Administrator.
      # remote-build.ps1 does the trigger + marker poll and translates the verdict into an
      # exit code. See its header for the marker contract.
      - name: Run the build (SSM RunCommand -> crbuild)
        if: ${{ github.event_name == 'workflow_call' || !inputs.lifecycle_only }}
        id: build
        env:
          # The tag is applied by the rebase step above, not here — do_build.ps1 builds
          # whatever C:\cr\src is checked out at.
          JOB: ${{ inputs.job || 'official18' }}
          TASK: ${{ inputs.task_name || 'crbuild' }}
          TIMEOUT_MIN: ${{ inputs.timeout_minutes || 180 }}
        run: |
          set -euo pipefail
          chmod +x scripts/aws/ssm-run.sh
          b64=$(base64 -w0 scripts/aws/remote-build.ps1)
          # printf '%s\n' with ARGUMENTS only - never put the PowerShell in printf's format
          # string, which eats \b in C:\build and yields C:uild.
          printf '%s\n' \
            "[IO.File]::WriteAllBytes(\"C:\\build\\remote-build.ps1\", [Convert]::FromBase64String(\"${b64}\"))" \
            "& powershell -NoProfile -ExecutionPolicy Bypass -File C:\\build\\remote-build.ps1 -TaskName '${TASK}' -Job '${JOB}' -TimeoutMinutes ${TIMEOUT_MIN}" \
            'exit $LASTEXITCODE' \
          | scripts/aws/ssm-run.sh "$INSTANCE_ID" "browser#45 CI build ${GITHUB_RUN_ID}" "$TIMEOUT_MIN"

      # The box uploads to a RUN-SCOPED key and we download that exact key. The old version
      # took "newest object in the bucket", which picks up another run's artifact whenever
      # two builds overlap.
      - name: Upload the artifact from the box
        if: ${{ github.event_name == 'workflow_call' || !inputs.lifecycle_only }}
        env:
          JOB: ${{ inputs.job || 'official18' }}
        run: |
          set -euo pipefail
          key="builds/${GITHUB_RUN_ID}/dxr_browser_${JOB}.tar.gz"
          echo "ARTIFACT_KEY=$key" >> "$GITHUB_ENV"
          # The instance writes with its own instance-profile credentials; the bucket policy
          # allows PutObject under builds/* only, and only from this instance
          # (ec2:SourceInstanceARN), so the shared SSM role grants nothing fleet-wide.
          printf '%s\n' \
            "\$src = \"C:\\build\\dxr_browser_${JOB}.tar.gz\"" \
            'if (-not (Test-Path $src)) { "ERROR: no tarball at $src"; exit 1 }' \
            "& \"C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe\" s3 cp \$src s3://${ARTIFACT_BUCKET}/${key}" \
            'if ($LASTEXITCODE -ne 0) { "ERROR: upload failed"; exit 1 }' \
            '"uploaded"' \
          | scripts/aws/ssm-run.sh "$INSTANCE_ID" "browser#45 artifact upload ${GITHUB_RUN_ID}" 60

      - name: Fetch the artifact
        id: fetch
        if: ${{ github.event_name == 'workflow_call' || !inputs.lifecycle_only }}
        run: |
          set -euo pipefail
          key="$ARTIFACT_KEY"
          mkdir -p dist && aws s3 cp "s3://$ARTIFACT_BUCKET/$key" "dist/$(basename "$key")"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'workflow_call' || !inputs.lifecycle_only }}
        with:
          name: browser-build
          path: dist/
          retention-days: 7

      # ── the load-bearing cleanup ────────────────────────────────────────────────────
      # always(): a failed build, a cancelled run, or a timeout must still stop the box.
      - name: Stop the build box
        if: always()
        run: |
          set -uo pipefail
          aws ec2 stop-instances --instance-ids "$INSTANCE_ID" >/dev/null || true
          aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID" || true
          aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' --output text
